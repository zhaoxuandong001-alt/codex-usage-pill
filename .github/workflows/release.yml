name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build
        shell: pwsh
        run: ./build.ps1
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME dist/CodexUsagePill.exe dist/SHA256SUMS.txt --verify-tag --generate-notes --title "Codex Usage Pill $env:GITHUB_REF_NAME"
