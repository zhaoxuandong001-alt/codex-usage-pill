name: Build

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: pwsh
        run: ./build.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsagePill-windows-x64
          path: |
            dist/CodexUsagePill.exe
            dist/SHA256SUMS.txt
